name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Haetaan koko historia konfliktien välttämiseksi

      - name: Extraction Strike
        run: |
          echo "Titan Scaling: The Last Stand..."
          
          # 1. SETUP
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install anchor-cli --locked --version 0.30.0
          
          # 2. LOUHINTA - Tiedämme nyt polun!
          # Mennään suoraan sinne missä koodi on
          cd programs/sss_engine || cd sss-2 || echo "Directory not found, using root"
          
          mkdir -p ../../target/idl
          anchor idl build --out ../../target/idl || echo "IDL Build failed, but continuing..."

      - name: Force Push Results
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          
          # Varmistetaan, että olemme ajan tasalla ja ylikirjoitetaan konfliktit
          git pull origin main --rebase
          
          echo "Final Run: $(date)" > FINAL_SUCCESS.txt
          
          git add FINAL_SUCCESS.txt
          git add target/idl/*.json || true
          git commit -m "feat: bounty idl payload delivery" || echo "No changes"
          git push origin main
