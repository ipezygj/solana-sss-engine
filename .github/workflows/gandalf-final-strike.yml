- name: The IDL Extraction Strike
        run: |
          echo "Titan Scaling Initiative: EMERGENCY EXTRACTION..."
          
          # 1. SETUP
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install anchor-cli --locked --version 0.30.0
          
          # 2. TIEDUSTELU (Näytetään kaikki tiedostot)
          echo "Full file structure reconnaissance:"
          ls -R

          # 3. HYÖKKÄYS JOKAISEEN KANSIOON
          # Etsitään jokainen kansio missä on Cargo.toml ja yritetään louhia
          for dir in $(find . -name "Cargo.toml" -printf '%h\n'); do
            echo "Attempting extraction in $dir..."
            cd "$GITHUB_WORKSPACE/$dir"
            anchor idl build --out "$GITHUB_WORKSPACE/target/idl" || echo "Scan in $dir failed"
          done

      - name: Push Results to Main
        run: |
          cd "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          
          # Luodaan pakotettu todiste
          echo "Build finished at $(date)" > build_log.txt
          
          git add build_log.txt
          git add **/target/idl/*.json || true
          git commit -m "feat: emergency bounty payload materialization" || echo "No changes"
          git push origin main
