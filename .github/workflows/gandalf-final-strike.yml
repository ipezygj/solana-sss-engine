name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: The Flawless Nuke Build
        run: |
          echo "Stealth Flawless Nuke Final Starting: $(date)"
          
          # 1. AIKAKONE 1.75.0 (Vain Anchor CLI:tä varten)
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          find . -name "Cargo.lock" -type f -delete
          
          # Taotaan Anchor
          echo "Forging Anchor CLI 0.30.0..."
          cargo install anchor-cli --locked --version 0.30.0
          
          # 2. THE SMART GLOBAL SOLUTION: Vaihdetaan 1.68.0 -kääntäjään
          echo "Switching to Rust 1.68.0 for lockfile generation..."
          rustup install 1.68.0
          rustup default 1.68.0
          
          # 3. ANCHORIN TURVAVYÖ
          echo "Injecting Seatbelt..."
          cat >> Cargo.toml << 'EOF'

          [profile.release]
          overflow-checks = true
          EOF
          
          # 4. GENERATE LOCKFILE
          echo "Generating 1.68.0 Lockfile..."
          cargo generate-lockfile
          
          # 5. TÄSMÄNEULAT: Tässä on koko käärmeenpesän vastalääke kerralla!
          echo "Applying precision pins safely..."
          cargo update -p blake3 --precise 1.5.0 || true
          cargo update -p toml_edit --precise 0.21.0 || true
          cargo update -p toml_datetime --precise 0.6.3 || true
          cargo update -p serde_json --precise 1.0.146 || true
          cargo update -p ryu --precise 1.0.16 || true
          cargo update -p wit-bindgen --precise 0.19.2 || true
          
          # 6. JEDI MIND TRICK: Varmistetaan V3-muoto
          echo "Downgrading lockfile format if needed..."
          if grep -q "version = 4" Cargo.lock; then
              sed -i 's/version = 4/version = 3/' Cargo.lock
          fi
          
          # 7. RAKENNETAAN MOOTTORI
          echo "=== Phase 3: Build engine ==="
          anchor build
          
          echo "Scanning target for IDL..."
          ls -R target/idl/ || echo "IDL not found yet"

      - name: Materialize IDL to Repository
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl data_payload [$(date)]" || echo "No changes"
          git push
