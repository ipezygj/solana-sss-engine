name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: The Split & Precision Pin
        run: |
          echo "Stealth Precision Pin Starting: $(date)"
          
          # 1. AIKAKONE: Rust 1.75.0 Anchorin kääntämiseen
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          
          # Siivotaan haamulokot
          find . -name "Cargo.lock" -type f -delete
          
          # 2. TAOTAAN ANCHOR 0.30.0
          echo "Forging Anchor CLI 0.30.0..."
          cargo install anchor-cli --locked --version 0.30.0
          
          # 3. TYÖKALUJEN VAIHTO: Uusin Rust moottorille
          echo "Switching to latest stable Rust for the engine build..."
          rustup default stable
          rustup update
          
          # 4. ANCHORIN TURVAVYÖ
          echo "Injecting Anchor's mandatory seatbelt..."
          cat >> Cargo.toml << 'EOF'

          [profile.release]
          overflow-checks = true
          EOF
          
          # 5. THE PRECISION PIN: Pakotetaan blake3 versio oikeaoppisesti!
          echo "Generating lockfile and precision-pinning blake3 to v1.5.0..."
          cargo generate-lockfile
          cargo update -p blake3 --precise 1.5.0 || echo "Blake3 pin failed or not present, continuing..."
          
          # 6. RAKENNETAAN MOOTTORI
          echo "Igniting Anchor Build..."
          anchor build
          
          echo "Scanning target for IDL..."
          ls -R target/idl/ || echo "IDL not found yet"

      - name: Materialize IDL to Repository
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl data_payload [$(date)]" || echo "No changes"
          git push
