name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.18/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor-cli@0.31.2

      - name: Build and Force Push
        run: |
          anchor build
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: materializing idl" || echo "No changes"
          git push
