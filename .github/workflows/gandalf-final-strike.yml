name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Force Install Solana
        run: |
          echo "Initiating Stealth Deployment at: $(date)"
          # SSL-virheiden kierto: wget + retry
          wget --tries=10 --waitretry=10 --retry-connrefused https://release.solana.com/v1.18.18/install
          chmod +x install
          ./install
          # Pakotetaan polku aktiiviseksi
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          solana --version

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli@0.31.2 --force
          anchor --version

      - name: Supreme-Sync Build
        run: |
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          # Rakennetaan moottori
          anchor build
          echo "Scanning for IDL payload..."
          ls -R target/idl/ || echo "Warning: IDL directory not found yet"

      - name: Materialize IDL to Repository
        run: |
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          # Pakotetaan IDL näkyviin
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl payload [$(date)]" || echo "No changes to commit"
          git push
