name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: The IDL Extraction Strike
        run: |
          echo "Titan Scaling Initiative: IDL Extraction Starting..."
          
          # 1. AIKAKONE 1.75.0 (Vain Anchor CLI:tä varten)
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          
          # 2. ANCHOR 0.30.0
          cargo install anchor-cli --locked --version 0.30.0
          
          # 3. POISTETAAN VANHA LUKKO (Annetaan Cargon generoida uusi, vakaampi)
          rm -f Cargo.lock
          
          # 4. TITANIC BYPASS: Isketään suoraan IDL-louhintaan
          # Tämä komento yrittää generoida IDL:n lukemalla lähdekoodia, 
          # välittäen vähemmän riippuvuuksien kääntämisestä.
          echo "Attempting to parse IDL directly..."
          mkdir -p target/idl
          
          # Käytetään Anchorin omaa parseria, joka on usein joustavampi kuin koko build-prosessi
          anchor idl build || echo "Direct build failed, trying manual parse..."
          
          # Jos se epäonnistuu, kokeillaan tätä:
          anchor build --idl target/idl || echo "Warning: Build failed, but checking for IDL anyway..."
          
          echo "Scanning for payload..."
          ls -R target/idl/ || echo "IDL not found"

      - name: Materialize IDL to Repository
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl data_payload [$(date)]" || echo "No changes"
          git push
