name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: The Absolute Override Build
        run: |
          echo "Stealth Absolute Override Starting: $(date)"
          
          # 1. AIKAKONE 1.75.0 (Vain Anchor CLI:tä varten)
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          find . -name "Cargo.lock" -type f -delete
          
          # Taotaan Anchor
          cargo install anchor-cli --locked --version 0.30.0
          
          # 2. VAIHTO 1.68.0 -KÄÄNTÄJÄÄN
          rustup install 1.68.0
          rustup default 1.68.0
          
          # 3. THE ABSOLUTE PATCH: Pakotetaan wit-bindgen polvilleen Cargo.toml-tasolla
          echo "Applying Absolute Patch to Cargo.toml..."
          cat >> Cargo.toml << 'EOF'

          [profile.release]
          overflow-checks = true

          [patch.crates-io]
          # Tämä korvaa KAIKKI wit-bindgen versiot yhdellä toimivalla
          "wit-bindgen" = { git = "https://github.com/bytecodealliance/wit-bindgen", rev = "v0.19.2" }
          EOF
          
          # 4. GENERATE LOCKFILE
          echo "Generating 1.68.0 Lockfile..."
          cargo generate-lockfile
          
          # 5. TÄSMÄNEULAT (Muut pahikset)
          echo "Applying precision pins..."
          cargo update -p blake3 --precise 1.5.0 || true
          cargo update -p toml_edit --precise 0.21.0 || true
          cargo update -p toml_datetime --precise 0.6.3 || true
          cargo update -p serde_json --precise 1.0.146 || true
          cargo update -p ryu --precise 1.0.16 || true
          
          # 6. JEDI MIND TRICK (V4 -> V3)
          if grep -q "version = 4" Cargo.lock; then
              sed -i 's/version = 4/version = 3/' Cargo.lock
          fi
          
          # 7. RAKENNETAAN MOOTTORI
          echo "=== Phase 3: Build engine ==="
          anchor build
