name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: The Oracle's Nuke Build
        run: |
          echo "Stealth Nuclear Strike Starting: $(date)"
          
          # 1. AIKAKONE 1.75.0 (Vain Anchor CLI:tä varten)
          echo "=== Phase 1: Build Anchor CLI ==="
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          
          # Haamujen siivous
          find . -name "Cargo.lock" -type f -delete
          
          # Taotaan Anchor
          echo "Forging Anchor CLI 0.30.0..."
          cargo install anchor-cli --locked --version 0.30.0
          
          # 2. THE SMART GLOBAL SOLUTION: Vaihto 1.68.0 -kääntäjään
          echo "=== Phase 2: Generate Rust 1.68-compatible lockfile ==="
          rustup install 1.68.0
          rustup default 1.68.0
          
          # 3. THE NUCLEAR PATCH: Kaikkien myyrien tappo kerralla + Anchorin turvavyö
          echo "Injecting Nuclear Patch and Seatbelt..."
          cat >> Cargo.toml << 'EOF'

          [profile.release]
          overflow-checks = true

          [patch.crates-io]
          blake3 = { version = "=1.5.0" }
          toml_edit = { version = "=0.21.0" }
          toml_datetime = { version = "=0.6.3" }
          serde_json = { version = "=1.0.146" }
          ryu = { version = "=1.0.16" }
          EOF
          
          # 4. GENERATE LOCKFILE: Nyt Cargo itse ymmärtää rajoitukset
          echo "Generating 1.68.0 Lockfile..."
          cargo generate-lockfile
          
          # 5. JEDI MIND TRICK: Varmistetaan V3-muoto
          echo "Downgrading lockfile format if needed..."
          if grep -q "version = 4" Cargo.lock; then
              sed -i 's/version = 4/version = 3/' Cargo.lock
          fi
          
          # 6. RAKENNETAAN MOOTTORI
          echo "=== Phase 3: Build program ==="
          anchor build
          
          echo "Scanning target for IDL..."
          ls -R target/idl/ || echo "IDL not found yet"

      - name: Materialize IDL to Repository
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl data_payload [$(date)]" || echo "No changes"
          git push
