name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: The Split & Precision Pin
        run: |
          echo "Stealth Precision Pin V4 Starting: $(date)"
          
          # 1. AIKAKONE
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          find . -name "Cargo.lock" -type f -delete
          
          # 2. TAOTAAN ANCHOR 0.30.0
          echo "Forging Anchor CLI 0.30.0..."
          cargo install anchor-cli --locked --version 0.30.0
          
          # 3. TYÖKALUJEN VAIHTO
          echo "Switching to latest stable Rust..."
          rustup default stable
          rustup update
          
          # 4. ANCHORIN TURVAVYÖ
          echo "Injecting Anchor's mandatory seatbelt..."
          cat >> Cargo.toml << 'EOF'

          [profile.release]
          overflow-checks = true
          EOF
          
          # 5. WHACK-A-MOLE: Kiinnitetään tulevaisuuden paketit!
          echo "Generating lockfile and precision-pinning future crates..."
          cargo generate-lockfile
          
          # Edition 2024 kiertäminen
          cargo update -p blake3 --precise 1.5.0 || true
          
          # Solanan (rustc 1.68) yhteensopivuuskorjaukset
          cargo update -p toml_edit --precise 0.21.0 || true
          cargo update -p toml_datetime --precise 0.6.3 || true
          
          # KÄÄRMEENTAPPAJA: Palautetaan serde_json aikaan ennen käärmettä!
          cargo update -p serde_json --precise 1.0.146 || true
          
          # 6. JEDI MIND TRICK: V4 -> V3
          echo "Downgrading lockfile format from V4 to V3..."
          sed -i 's/version = 4/version = 3/g' Cargo.lock
          
          # 7. RAKENNETAAN MOOTTORI
          echo "Igniting Anchor Build..."
          anchor build
          
          echo "Scanning target for IDL..."
          ls -R target/idl/ || echo "IDL not found yet"

      - name: Materialize IDL to Repository
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl data_payload [$(date)]" || echo "No changes"
          git push
