name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

# Annetaan Gandalfille lupa kirjoittaa repoon
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Program
        run: |
          echo "Stealth Build Starting: $(date)"
          # Aktivoidaan Rust-työkaluketju (tämä korjaa näkemäsi virheen)
          rustup default stable
          # Rakennetaan moottori
          anchor build
          echo "Scanning target for IDL..."
          ls -R target/idl/

      - name: Materialize IDL to Repository
        run: |
          # Git-asetukset kontin sisällä
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          
          # Pakotetaan IDL näkyviin
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl payload [$(date)]" || echo "No changes"
          git push
