name: Supreme Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Tämä sallii napin painamisen käsin!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Force Clean Install
        run: |
          echo "Force start at: $(date)"
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.18/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli@0.31.2 --force
          anchor --version

      - name: Anchor Build
        run: |
          anchor build
          echo "Checking generated files..."
          ls -R target/idl/ || echo "IDL NOT FOUND"

      - name: Push IDL to Repo
        run: |
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: materializing idl $(date)" || echo "No changes"
          git push
