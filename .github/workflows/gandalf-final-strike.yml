name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Force Install Solana
        run: |
          # Lisätään satunnainen kaiku, jotta välimuisti murtuu
          echo "Force run: $(date)"
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.18/install)"
          # Pakotetaan polku aktiiviseksi tässä istunnossa
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          solana --version

      - name: Force Install Anchor
        run: |
          npm install -g @coral-xyz/anchor-cli@0.31.2
          # Tarkistetaan heti asennus
          /usr/local/bin/anchor --version || echo "Anchor not in default path"

      - name: Real Build
        run: |
          # Lisätään suora polku kääntäjään
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          anchor build
          
      - name: Push Results
        run: |
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: materializing idl" || echo "No changes"
          git push
