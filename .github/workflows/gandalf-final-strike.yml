name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Force Clean Build
        run: |
          echo "Stealth Triple Bolt Starting: $(date)"
          
          # 1. AIKAKONE
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          
          # 2. PUHDISTUS
          find . -name "Cargo.lock" -type f -delete
          
          # 3. TAOTAAN ANCHOR 0.30.0
          cargo install anchor-cli --locked --version 0.30.0
          
          # 4. THE TRIPLE BOLT: Kirjoitetaan asetukset jokaiseen Cargo.toml -tiedostoon
          echo "Injecting overflow-checks to all config files..."
          for f in $(find . -name "Cargo.toml"); do
            echo "" >> "$f"
            echo "[profile.release]" >> "$f"
            echo "overflow-checks = true" >> "$f"
            echo "Fixed $f"
          done
          
          # 5. RAKENNETAAN MOOTTORI
          echo "Igniting Anchor Build..."
          anchor build
          
          echo "Scanning target for IDL..."
          ls -R target/idl/

      - name: Materialize IDL to Repository
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: materialize idl payload [$(date)]" || echo "No changes"
          git push
