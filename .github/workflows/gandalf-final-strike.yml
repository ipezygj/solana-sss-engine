name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Force Clean Build
        run: |
          echo "Stealth Clean Build Starting: $(date)"
          
          # 1. Asennetaan Rust uudelleen (toimivaksi todettu tapa)
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          export PATH="$HOME/.cargo/bin:$PATH"
          
          # 2. PUHDISTUS: Poistetaan KAIKKI lukkotiedostot ja target-kansiot
          echo "Nuking all lockfiles and targets..."
          find . -name "Cargo.lock" -type f -delete
          find . -name "target" -type d -exec rm -rf {} + || true
          
          # 3. TAOTAAN ANCHOR 0.30.0 (Tämä täsmää koodisi kanssa!)
          echo "Forging Anchor CLI 0.30.0... This takes ~5-8 mins."
          cargo install anchor-cli --locked --version 0.30.0
          
          # 4. RAKENNETAAN MOOTTORI
          echo "Igniting Anchor Build..."
          anchor build
          
          echo "Scanning target for IDL..."
          ls -R target/idl/

      - name: Materialize IDL to Repository
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl payload [$(date)]" || echo "No changes"
          git push
