name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Palataan konttiin, joka TODISTETUSTI latautui aiemmin
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Upgrade Engine & Build
        run: |
          echo "Stealth Engine Upgrade Starting: $(date)"
          
          # 1. KORJATAAN RUST (Tämä poistaa sen Cargo.lock v4 -virheen)
          rustup update stable
          rustup default stable
          rm -f Cargo.lock
          
          # 2. KORJATAAN ANCHOR (Päivitetään 0.29.0 -> 0.31.2 lennosta)
          # Kontissa on onneksi 'avm' (Anchor Version Manager) valmiina!
          avm install 0.31.2
          avm use 0.31.2
          anchor --version
          
          # 3. RAKENNETAAN MOOTTORI
          echo "Igniting Anchor Build..."
          anchor build
          
          echo "Scanning target for IDL..."
          ls -R target/idl/

      - name: Materialize IDL to Repository
        run: |
          # Git-oikeudet kuntoon kontin sisällä
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          
          # Pakotetaan IDL näkyviin holvissa
          git add -f target/idl/*.json || true
          git commit -m "chore: reveal idl payload [$(date)]" || echo "No changes"
          git push
