name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Extraction Strike
        run: |
          echo "Titan Scaling: Final Emergency Extraction..."
          
          # 1. SETUP - Suora asennus
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install anchor-cli --locked --version 0.30.0
          
          # 2. TIEDUSTELU - Listataan kaikki, jotta nähdään missä ollaan
          ls -R
          
          # 3. LOUHINTA - Etsitään Anchor.toml ja louhitaan IDL
          find . -name "Anchor.toml" -execdir anchor idl build --out /tmp/idl \; || echo "IDL Build command failed"
          
          # 4. KERÄYS - Siirretään louhittu data oikeaan paikkaan
          mkdir -p target/idl
          cp /tmp/idl/*.json target/idl/ || echo "No files found in /tmp/idl"

      - name: Push Results
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          
          # Lisätään status-tiedosto todisteeksi
          echo "Build attempt: $(date)" > build_status.txt
          
          git add build_status.txt
          git add target/idl/*.json || true
          git commit -m "feat: bounty payload materialization" || echo "No changes to commit"
          git push origin main
