name: Supreme Sync

on:
  workflow_dispatch: # Sallii manuaalisen käynnistyksen!
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.18/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor-cli@0.31.2

      - name: Supreme-Sync Build
        run: |
          anchor build
          # Tarkistetaan heti kääntämisen jälkeen, syntyikö tiedosto
          ls -R target/idl/

      - name: Force Commit IDL
        run: |
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          git add -f target/idl/*.json || true
          git commit -m "chore: REVEAL PAYLOAD $(date)" || echo "No changes"
          git push
