name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.29.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: The IDL Extraction Strike
        run: |
          echo "Titan Scaling Initiative: Final IDL Extraction..."
          
          # 1. SETUP - Asennetaan vakaa ympäristö
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.75.0
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install anchor-cli --locked --version 0.30.0
          
          # 2. ETSITÄÄN ANCHOR-PROJEKTI (The Searchlight)
          # Etsitään missä Anchor.toml oikeasti luuraa
          PROJECT_DIR=$(find . -name "Anchor.toml" -printf '%h\n' | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "❌ ERROR: Anchor.toml not found! Are we in the right repo?"
            ls -R
            exit 1
          fi
          cd "$PROJECT_DIR"
          echo "✅ Found Anchor project in: $PROJECT_DIR"

          # 3. LOUHINTA (The Payload)
          # Tehdään kevyt build, joka keskittyy vain IDL-tiedostoon
          mkdir -p target/idl
          anchor idl build --out target/idl || anchor build --idl target/idl || echo "Warning: IDL parse partial"
          
          echo "Scanning for bounty payload..."
          ls -R target/idl/ || echo "IDL still hiding"

      - name: Materialize IDL to Repository
        run: |
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          # Etsitään kaikki .json tiedostot target-kansiosta ja pakotetaan ne koodiin
          find . -name "*.json" -path "*/target/idl/*" -exec git add -f {} + || true
          git commit -m "chore: reveal idl bounty_payload [$(date)]" || echo "No changes"
          git push
