name: Final Strike

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Käytetään Coral-XYZ:n virallista modernia konttia
    container:
      image: ghcr.io/coral-xyz/anchor-build:v0.31.0
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Program
        run: |
          echo "Stealth Build 0.31.2 Starting: $(date)"
          
          # Pakotetaan Rust päivittymään, jos kontti on hieman jäljessä
          rustup update stable
          rustup default stable
          
          # MEKAANIKON KIKKA: Varmistetaan että olemme oikeassa versiossa
          # Jos Anchor.toml vaatii 0.31.2, avm hoitaa sen
          avm install 0.31.2 || echo "Using container default anchor"
          avm use 0.31.2 || echo "Continuing with current version"
          
          # Rakennetaan moottori
          anchor build
          echo "Scanning target for IDL..."
          ls -R target/idl/

      - name: Materialize IDL to Repository
        run: |
          # Git-oikeudet kuntoon kontin sisällä
          git config --global --add safe.directory /__w/solana-sss-engine/solana-sss-engine
          git config --global user.name "Gandalf"
          git config --global user.email "stealth@bridge.com"
          
          # Pakotetaan IDL näkyviin holvissa
          git add -f target/idl/*.json || true
          git commit -m "chore: materialize idl 0.31.2 [$(date)]" || echo "No changes"
          git push
